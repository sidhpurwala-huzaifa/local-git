{% extends "base.html" %}
{% block title %}Commits · {{ repo_name }}{% endblock %}
{% block body %}
  <div class="panel">
    <ul class="commit-list">
      {% for row in rows %}
        <li>
          <div class="commit-subject">
            <a href="{{ url_for('commit', sha=row.sha) }}">{{ row.subject }}</a>
          </div>
          <div class="commit-meta">
            <span class="sha">{{ row.sha[:7] }}</span>
            · {{ row.author }} · {{ row.date }}
          </div>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
