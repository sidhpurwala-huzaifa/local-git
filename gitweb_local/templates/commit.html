{% extends "base.html" %}
{% block title %}{{ sha[:7] }} · {{ repo_name }}{% endblock %}
{% block body %}
  <div class="banner">
    <a href="{{ url_for('commits', ref=ref) }}">← Back to commits</a>
    &nbsp;·&nbsp;
    <a href="{{ url_for('tree', ref=sha, path='') }}">Browse tree at this commit</a>
  </div>
  <div class="panel">
    <pre class="code">{{ full }}</pre>
  </div>
{% endblock %}
